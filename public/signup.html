<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --fg: #09090b;
      --muted: #71717a;
      --border: #e4e4e7;
      --input-bg: #ffffff;
      --ring: #18181b;
      --card-bg: #ffffff;
      --card-shadow: 0 1px 3px 0 rgb(0 0 0 / .1), 0 1px 2px -1px rgb(0 0 0 / .1);
      --radius: 0.5rem;
      --btn-bg: #18181b;
      --btn-fg: #fafafa;
      --btn-hover: #27272a;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #09090b;
        --fg: #fafafa;
        --muted: #a1a1aa;
        --border: #27272a;
        --input-bg: #09090b;
        --ring: #d4d4d8;
        --card-bg: #18181b;
        --card-shadow: 0 1px 3px 0 rgb(0 0 0 / .4), 0 1px 2px -1px rgb(0 0 0 / .4);
        --btn-bg: #fafafa;
        --btn-fg: #18181b;
        --btn-hover: #e4e4e7;
      }
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 100%;
      max-width: 360px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: var(--card-shadow);
      padding: 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .icon {
      width: 40px;
      height: 40px;
      background: var(--fg);
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.375rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }

    .form { display: flex; flex-direction: column; gap: 1rem; }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--fg);
    }

    input {
      width: 100%;
      height: 2.375rem;
      padding: 0 0.75rem;
      font-family: inherit;
      font-size: 0.875rem;
      color: var(--fg);
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: var(--ring);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 20%, transparent);
    }

    input[aria-invalid="true"] {
      border-color: #ef4444;
    }

    input[aria-invalid="true"]:focus {
      box-shadow: 0 0 0 3px color-mix(in srgb, #ef4444 20%, transparent);
    }

    .hint {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .hint.error { color: #ef4444; }

    button[type="submit"] {
      width: 100%;
      height: 2.375rem;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--btn-fg);
      background: var(--btn-bg);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      margin-top: 0.25rem;
      transition: background 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    button[type="submit"]:hover { background: var(--btn-hover); }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid color-mix(in srgb, var(--btn-fg) 30%, transparent);
      border-top-color: var(--btn-fg);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      display: none;
      font-size: 0.8125rem;
      color: #ef4444;
      background: color-mix(in srgb, #ef4444 10%, transparent);
      border: 1px solid color-mix(in srgb, #ef4444 25%, transparent);
      border-radius: var(--radius);
      padding: 0.625rem 0.75rem;
    }

    .success-msg {
      display: none;
      font-size: 0.8125rem;
      color: #16a34a;
      background: color-mix(in srgb, #16a34a 10%, transparent);
      border: 1px solid color-mix(in srgb, #16a34a 25%, transparent);
      border-radius: var(--radius);
      padding: 0.625rem 0.75rem;
    }

    .terms {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    .terms a {
      color: var(--fg);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .footer {
      text-align: center;
      font-size: 0.8125rem;
      color: var(--muted);
      margin-top: 1.25rem;
    }

    .footer a {
      color: var(--fg);
      font-weight: 500;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--bg)">
          <path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z"/>
          <path d="M20 21a8 8 0 1 0-16 0"/>
        </svg>
      </div>
      <h1>Create an account</h1>
      <p class="subtitle">Enter your details to get started</p>
    </div>

    <form class="form" id="signupForm" novalidate>
      <div id="errorMsg" class="error-msg" role="alert"></div>
      <div id="successMsg" class="success-msg" role="status"></div>

      <div class="field-row">
        <div class="field">
          <label for="firstName">First name</label>
          <input id="firstName" name="firstName" type="text" autocomplete="given-name" placeholder="John" required />
        </div>
        <div class="field">
          <label for="lastName">Last name</label>
          <input id="lastName" name="lastName" type="text" autocomplete="family-name" placeholder="Doe" required />
        </div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" placeholder="••••••••" required />
        <span class="hint" id="passwordHint">Must be at least 8 characters</span>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" placeholder="••••••••" required />
        <span class="hint error" id="confirmHint" style="display:none">Passwords do not match</span>
      </div>

      <button type="submit" id="submitBtn">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">Create account</span>
      </button>

      <p class="terms">
        By creating an account you agree to our
        <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
      </p>
    </form>

    <div class="footer">
      Already have an account? <a href="/o/authenticate">Sign in</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('signupForm');
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');
    const confirmHint = document.getElementById('confirmHint');

    const params = new URLSearchParams(window.location.search);

    confirmInput.addEventListener('input', () => {
      const mismatch = confirmInput.value && confirmInput.value !== passwordInput.value;
      confirmHint.style.display = mismatch ? 'block' : 'none';
      confirmInput.setAttribute('aria-invalid', mismatch ? 'true' : 'false');
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      successMsg.style.display = 'none';
    }

    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.style.display = 'block';
      errorMsg.style.display = 'none';
    }

    function hideMessages() {
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      spinner.style.display = loading ? 'block' : 'none';
      btnText.textContent = loading ? 'Creating account…' : 'Create account';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmInput.value;

      if (!firstName || !lastName || !email || !password || !confirmPassword) {
        showError('Please fill in all fields.');
        return;
      }

      if (password.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }

      if (password !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/o/authenticate/sign-up', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            firstName,
            lastName,
            email,
            password,
            client_id: params.get('client_id'),
            redirect_uri: params.get('redirect_uri'),
            state: params.get('state'),
            nonce: params.get('nonce'),
          }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          showError(data.message || 'Something went wrong. Please try again.');
        } else if (data.redirect) {
          window.location.href = data.redirect;
        } else {
          showSuccess('Account created! Redirecting…');
          setTimeout(() => {
            window.location.href = `/o/oauth2/v2/auth${window.location.search}`;
          }, 1500);
        }
      } catch {
        showError('Something went wrong. Please try again.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
